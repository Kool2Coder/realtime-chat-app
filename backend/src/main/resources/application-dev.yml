spring:
  datasource:
    url: jdbc:h2:mem:chatapp;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
  jpa:
    show-sql: true
  data:
    redis:
      host: localhost
      port: 6379

websocket:
  redis-broker:
    enabled: false

logging:
  level:
    com.chatapp: DEBUG
