spring:
  application:
    name: chatapp-backend

  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  # Database - H2 (default) or MySQL
  datasource:
    url: ${DB_URL:jdbc:h2:mem:chatapp;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE}
    username: ${DB_USERNAME:sa}
    password: ${DB_PASSWORD:}
    driver-class-name: ${DB_DRIVER:org.h2.Driver}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: ${DB_DIALECT:org.hibernate.dialect.H2Dialect}
    open-in-view: false

  # H2 Console (dev only)
  h2:
    console:
      enabled: true
      path: /h2-console

  # Redis
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 60000

# Server
server:
  port: ${SERVER_PORT:8080}
  servlet:
    context-path: /api

# JWT
jwt:
  secret: ${JWT_SECRET:404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}
  expiration-ms: ${JWT_EXPIRATION:86400000}

# WebSocket
websocket:
  use-external-broker: false
  redis-broker:
    enabled: ${REDIS_BROKER_ENABLED:true}

# Logging
logging:
  level:
    root: INFO
    com.chatapp: DEBUG
    org.springframework.web.socket: DEBUG
    org.springframework.messaging: DEBUG
